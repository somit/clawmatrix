<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClawMatrix</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128' width='128' height='128' fill='none'%3E%3Crect width='128' height='128' rx='18' fill='%230F172A'/%3E%3Cg stroke='%23334155' stroke-width='2' opacity='0.85'%3E%3Ccircle cx='64' cy='64' r='14'/%3E%3Ccircle cx='64' cy='64' r='26'/%3E%3Ccircle cx='64' cy='64' r='38'/%3E%3Ccircle cx='64' cy='64' r='50'/%3E%3Cpath d='M64 8V120'/%3E%3Cpath d='M8 64H120'/%3E%3Cpath d='M26 26L102 102'/%3E%3Cpath d='M102 26L26 102'/%3E%3C/g%3E%3Cdefs%3E%3Cg id='crab-red' stroke='%237F1D1D' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cellipse cx='0' cy='0' rx='9' ry='7' fill='%23EF4444'/%3E%3Cpath d='M-12 -2 C-16 -6 -16 2 -12 0'/%3E%3Cpath d='M12 -2 C16 -6 16 2 12 0'/%3E%3Cpath d='M-7 6 L-12 10'/%3E%3Cpath d='M-3 7 L-6 12'/%3E%3Cpath d='M3 7 L6 12'/%3E%3Cpath d='M7 6 L12 10'/%3E%3C/g%3E%3Cg id='lobster' stroke='%2392400E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cellipse cx='0' cy='0' rx='6' ry='14' fill='%23F59E0B'/%3E%3Cpath d='M0 14 L-3 20'/%3E%3Cpath d='M0 14 L3 20'/%3E%3Cpath d='M-10 -6 C-18 -10 -18 -2 -12 -2'/%3E%3Cpath d='M10 -6 C18 -10 18 -2 12 -2'/%3E%3Cpath d='M-4 2 L-10 6'/%3E%3Cpath d='M4 2 L10 6'/%3E%3C/g%3E%3Cg id='crab-green' stroke='%23166534' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cellipse cx='0' cy='0' rx='6' ry='5' fill='%2322C55E'/%3E%3Cpath d='M-8 -1 C-12 -4 -12 1 -8 0'/%3E%3Cpath d='M8 -1 C12 -4 12 1 8 0'/%3E%3Cpath d='M-5 4 L-8 7'/%3E%3Cpath d='M5 4 L8 7'/%3E%3C/g%3E%3C/defs%3E%3Cg transform='translate(40 42) rotate(-18) scale(1)'%3E%3Cuse href='%23crab-red'/%3E%3C/g%3E%3Cg transform='translate(92 44) rotate(20) scale(1)'%3E%3Cuse href='%23lobster'/%3E%3C/g%3E%3Cg transform='translate(72 92) rotate(10) scale(0.85)'%3E%3Cuse href='%23crab-green'/%3E%3C/g%3E%3C/svg%3E">
<link rel="stylesheet" href="/ui/style.css">
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="96" height="96" fill="none"><rect width="128" height="128" rx="18" fill="#0F172A"/><g stroke="#334155" stroke-width="2" opacity="0.85"><circle cx="64" cy="64" r="14"/><circle cx="64" cy="64" r="26"/><circle cx="64" cy="64" r="38"/><circle cx="64" cy="64" r="50"/><path d="M64 8V120"/><path d="M8 64H120"/><path d="M26 26L102 102"/><path d="M102 26L26 102"/></g><defs><g id="cr" stroke="#7F1D1D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="0" cy="0" rx="9" ry="7" fill="#EF4444"/><path d="M-12 -2 C-16 -6 -16 2 -12 0"/><path d="M12 -2 C16 -6 16 2 12 0"/><path d="M-7 6 L-12 10"/><path d="M-3 7 L-6 12"/><path d="M3 7 L6 12"/><path d="M7 6 L12 10"/></g><g id="lb" stroke="#92400E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="0" cy="0" rx="6" ry="14" fill="#F59E0B"/><path d="M0 14 L-3 20"/><path d="M0 14 L3 20"/><path d="M-10 -6 C-18 -10 -18 -2 -12 -2"/><path d="M10 -6 C18 -10 18 -2 12 -2"/><path d="M-4 2 L-10 6"/><path d="M4 2 L10 6"/></g><g id="cg" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="0" cy="0" rx="6" ry="5" fill="#22C55E"/><path d="M-8 -1 C-12 -4 -12 1 -8 0"/><path d="M8 -1 C12 -4 12 1 8 0"/><path d="M-5 4 L-8 7"/><path d="M5 4 L8 7"/></g></defs><g transform="translate(40 42) rotate(-18)"><use href="#cr"/></g><g transform="translate(92 44) rotate(20)"><use href="#lb"/></g><g transform="translate(72 92) rotate(10) scale(0.85)"><use href="#cg"/></g></svg></div>
    <h1>CLAWMATRIX</h1>
    <p>Enter admin token to access the control plane</p>
    <input type="password" id="login-token" placeholder="Admin token" autofocus
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()" id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- App (hidden until authenticated) -->
<div class="app" id="app">

  <header>
    <div class="container">
      <div class="left">
        <h1><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="28" height="28" fill="none" style="vertical-align:middle;margin-right:8px;border-radius:4px"><rect width="128" height="128" rx="18" fill="#0F172A"/><g stroke="#334155" stroke-width="2" opacity="0.85"><circle cx="64" cy="64" r="14"/><circle cx="64" cy="64" r="26"/><circle cx="64" cy="64" r="38"/><circle cx="64" cy="64" r="50"/><path d="M64 8V120"/><path d="M8 64H120"/><path d="M26 26L102 102"/><path d="M102 26L26 102"/></g><defs><g id="hcr" stroke="#7F1D1D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="0" cy="0" rx="9" ry="7" fill="#EF4444"/><path d="M-12 -2 C-16 -6 -16 2 -12 0"/><path d="M12 -2 C16 -6 16 2 12 0"/><path d="M-7 6 L-12 10"/><path d="M-3 7 L-6 12"/><path d="M3 7 L6 12"/><path d="M7 6 L12 10"/></g><g id="hlb" stroke="#92400E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="0" cy="0" rx="6" ry="14" fill="#F59E0B"/><path d="M0 14 L-3 20"/><path d="M0 14 L3 20"/><path d="M-10 -6 C-18 -10 -18 -2 -12 -2"/><path d="M10 -6 C18 -10 18 -2 12 -2"/><path d="M-4 2 L-10 6"/><path d="M4 2 L10 6"/></g><g id="hcg" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="0" cy="0" rx="6" ry="5" fill="#22C55E"/><path d="M-8 -1 C-12 -4 -12 1 -8 0"/><path d="M8 -1 C12 -4 12 1 8 0"/><path d="M-5 4 L-8 7"/><path d="M5 4 L8 7"/></g></defs><g transform="translate(40 42) rotate(-18)"><use href="#hcr"/></g><g transform="translate(92 44) rotate(20)"><use href="#hlb"/></g><g transform="translate(72 92) rotate(10) scale(0.85)"><use href="#hcg"/></g></svg> CLAWMATRIX</h1>
        <div class="health" id="health"></div>
      </div>
      <div class="header-right">
        <select id="tz-select" class="tz-select" onchange="onTZChange(this.value)" title="Display timezone"></select>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>
  </header>

  <nav>
    <div class="container">
      <button class="active" onclick="showTab('dashboard', this)">Dashboard</button>
      <button onclick="showTab('agents', this)">Agents</button>
      <button onclick="showTab('registrations', this)">Registrations</button>
      <button onclick="showTab('templates', this)">Profiles</button>
      <button onclick="showTab('connections', this)">Connections</button>
      <button onclick="showTab('logs', this)">Network Logs</button>
      <button onclick="showTab('crons', this)">Crons</button>
      <button onclick="showTab('events', this)">Events</button>
    </div>
  </nav>

  <main>
    <div class="container">

      <section id="dashboard-tab" class="active">
        <div class="section-header">
          <h2>Dashboard</h2>
          <div class="filter-bar">
            <select id="dashboard-template-filter" onchange="loadDashboard()">
              <option value="">All registrations</option>
            </select>
            <div class="time-range-bar" id="dashboard-time-range">
              <button class="active" onclick="setDashboardRange('1h', this)">1h</button>
              <button onclick="setDashboardRange('6h', this)">6h</button>
              <button onclick="setDashboardRange('24h', this)">24h</button>
              <button onclick="setDashboardRange('168h', this)">7d</button>
            </div>
          </div>
        </div>
        <div id="dashboard-kpis"></div>
        <div id="dashboard-charts"></div>
        <div id="dashboard-events"></div>
      </section>

      <section id="agents-tab">
        <div class="section-header">
          <h2>Agents</h2>
          <div class="filter-bar">
            <select id="template-filter" onchange="loadAgents()">
              <option value="">All registrations</option>
            </select>
            <button class="btn btn-sm" onclick="loadAgents()">Refresh</button>
          </div>
        </div>
        <div id="agent-detail" style="display:none"></div>
        <div id="agents-list"></div>
      </section>

      <section id="registrations-tab">
        <div class="section-header">
          <h2>Registrations</h2>
          <button class="btn btn-primary" onclick="showCreateRegistrationModal()">+ New Registration</button>
        </div>
        <div id="registrations-list"></div>
      </section>

      <section id="templates-tab">
        <div class="section-header">
          <h2>Agent Profiles</h2>
          <button class="btn btn-primary" onclick="showCreateTemplateModal()">+ New Profile</button>
        </div>
        <div id="templates-list"></div>
      </section>

      <section id="connections-tab">
        <div class="section-header">
          <h2>Connections</h2>
          <button class="btn btn-primary" onclick="showCreateConnectionModal()">+ New Connection</button>
        </div>
        <div id="connections-list"></div>
      </section>

      <section id="logs-tab">
        <div class="section-header">
          <h2>Network Logs</h2>
          <div class="filter-bar">
            <select id="log-template-filter" onchange="loadLogs()">
              <option value="">All registrations</option>
            </select>
            <button class="btn btn-sm" onclick="loadLogs()">Refresh</button>
          </div>
        </div>

        <!-- Sub-tabs -->
        <div class="subtab-bar">
          <button class="subtab active" id="subtab-domains" onclick="showLogsSubtab('domains', this)">Top Domains</button>
          <button class="subtab" id="subtab-requests" onclick="showLogsSubtab('requests', this)">Recent Requests</button>
        </div>

        <!-- Top Domains panel -->
        <div id="logs-panel-domains">
          <div class="subtab-toolbar">
            <div class="time-range-bar" id="stats-time-range">
              <button onclick="setStatsRange('1h', this)">1h</button>
              <button onclick="setStatsRange('6h', this)">6h</button>
              <button class="active" onclick="setStatsRange('24h', this)">24h</button>
              <button onclick="setStatsRange('168h', this)">7d</button>
            </div>
          </div>
          <div id="logs-domain-stats"></div>
        </div>

        <!-- Recent Requests panel -->
        <div id="logs-panel-requests" style="display:none">
          <div class="subtab-toolbar">
            <select id="log-action-filter" onchange="loadLogEntriesFromUI()">
              <option value="">All</option>
              <option value="allowed">Allowed</option>
              <option value="blocked">Blocked</option>
            </select>
            <input id="log-domain-filter" placeholder="Filter domain..." style="width:160px" onkeydown="if(event.key==='Enter')loadLogEntriesFromUI()">
            <div class="time-range-bar" id="logs-time-range">
              <button onclick="setLogsRange('1h', this)">1h</button>
              <button onclick="setLogsRange('6h', this)">6h</button>
              <button class="active" onclick="setLogsRange('24h', this)">24h</button>
              <button onclick="setLogsRange('168h', this)">7d</button>
            </div>
          </div>
          <div id="logs-entries"></div>
        </div>
      </section>

      <section id="crons-tab">
        <div class="section-header">
          <h2>Cron Jobs</h2>
          <div class="filter-bar">
            <select id="cron-template-filter" onchange="loadCrons()">
              <option value="">All registrations</option>
            </select>
            <button class="btn btn-sm" onclick="loadCrons()">Refresh</button>
            <button class="btn btn-primary" onclick="showCreateCronModal()">+ New Cron</button>
          </div>
        </div>
        <div id="crons-list"></div>
      </section>

      <section id="events-tab">
        <div class="section-header">
          <h2>Audit Events</h2>
          <div class="filter-bar">
            <select id="event-type-filter" onchange="loadEventsTab()">
              <option value="">All events</option>
              <option value="agent:registered">Agent Registered</option>
              <option value="agent:stale">Agent Stale</option>
              <option value="agent:recovered">Agent Recovered</option>
              <option value="agent:killed">Agent Killed</option>
              <option value="log:batch">Log Batch</option>
              <option value="registration:created">Registration Created</option>
              <option value="registration:updated">Registration Updated</option>
              <option value="connection:created">Connection Created</option>
              <option value="connection:deleted">Connection Deleted</option>
              <option value="template:created">Profile Created</option>
              <option value="template:updated">Profile Updated</option>
            </select>
            <div class="time-range-bar" id="events-time-range">
              <button class="active" onclick="setEventsRange('1h', this)">1h</button>
              <button onclick="setEventsRange('24h', this)">24h</button>
              <button onclick="setEventsRange('168h', this)">7d</button>
            </div>
            <button class="btn btn-sm" onclick="loadEventsTab()">Refresh</button>
          </div>
        </div>
        <div id="events-list"></div>
      </section>

    </div>
  </main>

</div>

<div id="modal-root"></div>
<div id="chat-root"></div>
<div id="workspace-root"></div>

<!-- JS: order matters (app.js defines globals used by others) -->
<script src="https://cdn.jsdelivr.net/npm/cronstrue@2.50.0/dist/cronstrue.min.js"></script>
<script src="/ui/js/app.js"></script>
<script src="/ui/js/registrations.js"></script>
<script src="/ui/js/templates.js"></script>
<script src="/ui/js/connections.js"></script>
<script src="/ui/js/agents.js"></script>
<script src="/ui/js/dashboard.js"></script>
<script src="/ui/js/logs.js"></script>
<script src="/ui/js/crons.js"></script>
<script src="/ui/js/events.js"></script>
<script src="/ui/js/chat.js"></script>
<script src="/ui/js/workspace.js"></script>
<script src="/ui/js/sessions.js"></script>
</body>
</html>
